<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choro Porteño</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

/* HERO */
.hero {
    min-height: 100vh;
    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url("dedia3.png") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: flex-start; /* 👈 clave */
    align-items: center;
    padding: 60px 20px 20px 20px;
}

h1 {
    font-size: 1.8rem;
    color: red;
}

/* PRODUCTO */
.product {
    margin-top: 20px;
    opacity: 0;
    transform: translateY(30px);
    animation: aparecer 1s ease forwards;
    animation-delay: 0.5s;
}

/* 🔥 SANGUCHE MÁS GRANDE (+20%) */
.burger {
    width: 100%;
    max-width: 500px;
    animation: flotar 3s ease-in-out infinite;
}

/* TEXTO */
.descripcion {
    margin-top: 15px;
    font-size: 1.1rem;
    line-height: 1.5;
    background: rgba(0,0,0,0.5);
    padding: 12px 18px;
    border-radius: 10px;
}

@keyframes aparecer {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes flotar {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* OFERTA */
.offer {
    padding: 40px 20px;
}

.cta-main {
    padding: 20px 40px;
    font-size: 1.3rem;
    background: red;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: pulse 1.5s infinite;
}

.cta-main:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 30px rgba(0,0,0,0.6);
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
}

/* BOTÓN FLOTANTE */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* 📱 MOBILE FIX */
@media (max-width: 768px) {
    .hero {
        padding-top: 30px;
    }

    h1 {
        font-size: 1.5rem;
    }

    .burger {
        max-width: 420px;
    }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>⚠️ CUIDADO CON EL LADRÓN DEL HAMBRE</h1>
    <p>Anda suelto en Viña… y ataca fuerte</p>

    <div class="product">
        <img src="merluza.png" class="burger">

        <p class="descripcion">
            <strong>CHORO PORTEÑO</strong><br>
            Pan crujiente + relleno brutal + sabor que no perdona
        </p>
    </div>
</div>

<!-- OFERTA -->
<div class="offer">
    <h2>💥 20% DE DESCUENTO</h2>
    <p>Aprovecha tu descuento escribiéndonos directo por WhatsApp</p>

    <a href="https://wa.me/56977122535?text=Hola%2C%20quiero%20mi%2020%25%20OFF%20del%20Choro%20Porte%C3%B1o%20%F0%9F%94%A5" target="_blank">
        <button class="cta-main">🔥 QUIERO MI 20% OFF</button>
    </a>
</div>

<!-- BOTÓN FLOTANTE -->
<a href="https://wa.me/56977122535?text=Hola%20puedo%20hacer%20un%20pedido" target="_blank" class="whatsapp-float">
    💬 Hacer pedido
</a>

</body>
</html>
