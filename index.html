<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choro Porteño</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

/* HERO */
.hero {
    min-height: 100vh;
    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url("dedia3.png") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 45px 20px 20px 20px;
}

h1 {
    font-size: 1.8rem;
    color: red;
}

/* PRODUCTO */
.product {
    margin-top: 10px;
    opacity: 0;
    transform: translateY(30px);
    animation: aparecer 1s ease forwards;
    animation-delay: 0.5s;
}

/* ESCENA SANGUCHE */
.sandwich-scene {
    position: relative;
    width: 95vw;
    max-width: 520px;
    height: 420px;
    margin: 0 auto;
}

.layer {
    position: absolute;
    left: 50%;
    width: 100%;
    transform: translateX(-50%);
    pointer-events: none;
}

/* CAPAS DE ABAJO HACIA ARRIBA */
.basepan {
    top: 250px;
    z-index: 1;
}

.lechuga {
    top: 205px;
    z-index: 2;
}

.caluga {
    top: 165px;
    z-index: 3;
}

.tomate {
    top: 130px;
    z-index: 4;
}

.ajiverde {
    top: 105px;
    z-index: 5;
}

.cebollamorada {
    top: 85px;
    z-index: 6;
}

/* TAPA ARRIBA, PERO DETRÁS DE SALSA */
.tapa {
    top: 15px;
    z-index: 7;
}

.salsa {
    top: 65px;
    z-index: 8;
}

/* TEXTO */
.descripcion {
    margin-top: 5px;
    font-size: 1.1rem;
    line-height: 1.5;
    background: rgba(0,0,0,0.5);
    padding: 12px 18px;
    border-radius: 10px;
}

@keyframes aparecer {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes flotar {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0px); }
}

/* OFERTA */
.offer {
    padding: 40px 20px;
}

.cta-main {
    padding: 20px 40px;
    font-size: 1.3rem;
    background: red;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: pulse 1.5s infinite;
}

.cta-main:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 30px rgba(0,0,0,0.6);
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
}

/* BOTÓN FLOTANTE */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 99;
}

/* CELULAR */
@media (max-width: 768px) {
    .hero {
        padding-top: 25px;
    }

    h1 {
        font-size: 1.5rem;
    }

    .sandwich-scene {
        width: 105vw;
        max-width: 460px;
        height: 360px;
    }

    .basepan {
        top: 220px;
    }

    .lechuga {
        top: 180px;
    }

    .caluga {
        top: 145px;
    }

    .tomate {
        top: 115px;
    }

    .ajiverde {
        top: 92px;
    }

    .cebollamorada {
        top: 72px;
    }

    .tapa {
        top: 5px;
    }

    .salsa {
        top: 52px;
    }

    .descripcion {
        font-size: 1rem;
        margin-top: 0;
    }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>⚠️ CUIDADO CON EL LADRÓN DEL HAMBRE</h1>
    <p>Anda suelto en Viña… y ataca fuerte</p>

    <div class="product">

        <div class="sandwich-scene">
            <img src="basepan.png" class="layer basepan">
            <img src="lechuga.png" class="layer lechuga">
            <img src="caluga.png" class="layer caluga">
            <img src="tomate.png" class="layer tomate">
            <img src="ajiverde.png" class="layer ajiverde">
            <img src="cebollamorada.png" class="layer cebollamorada">
            <img src="tapa.png" class="layer tapa">
            <img src="salsa.png" class="layer salsa">
        </div>

        <p class="descripcion">
            <strong>CHORO PORTEÑO</strong><br>
            Pan crujiente + relleno brutal + sabor que no perdona
        </p>

    </div>
</div>

<!-- OFERTA -->
<div class="offer">
    <h2>💥 20% DE DESCUENTO</h2>
    <p>Aprovecha tu descuento escribiéndonos directo por WhatsApp</p>

    <a href="https://wa.me/56977122535?text=Hola%2C%20quiero%20mi%2020%25%20OFF%20del%20Choro%20Porte%C3%B1o%20%F0%9F%94%A5" target="_blank">
        <button class="cta-main">🔥 QUIERO MI 20% OFF</button>
    </a>
</div>

<!-- BOTÓN FLOTANTE -->
<a href="https://wa.me/56977122535?text=Hola%20puedo%20hacer%20un%20pedido" target="_blank" class="whatsapp-float">
    💬 Hacer pedido
</a>

<script>
window.addEventListener("scroll", () => {
    const scroll = window.scrollY;

    // límite para que no se separen demasiado
    const move = Math.min(scroll * 0.08, 35);

    document.querySelector(".basepan").style.transform =
        `translateX(-50%) translateY(${move * 0.2}px)`;

    document.querySelector(".lechuga").style.transform =
        `translateX(-50%) translateY(${-move * 0.2}px)`;

    document.querySelector(".caluga").style.transform =
        `translateX(-50%) translateY(${-move * 0.45}px)`;

    document.querySelector(".tomate").style.transform =
        `translateX(-50%) translateY(${-move * 0.7}px)`;

    document.querySelector(".ajiverde").style.transform =
        `translateX(-50%) translateY(${-move * 0.9}px)`;

    document.querySelector(".cebollamorada").style.transform =
        `translateX(-50%) translateY(${-move * 1.1}px)`;

    document.querySelector(".tapa").style.transform =
        `translateX(-50%) translateY(${-move * 1.5}px)`;

    document.querySelector(".salsa").style.transform =
        `translateX(-50%) translateY(${-move * 1.25}px)`;
});
</script>

</body>
</html>
