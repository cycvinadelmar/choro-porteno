<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choro Porteño</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1550547660-d9450f859349') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

h1 {
    font-size: 1.8rem;
    color: red;
}

.product {
    margin-top: 20px;
    font-size: 1rem;

    /* ANIMACIÓN */
    opacity: 0;
    transform: translateY(30px);
    animation: aparecer 1s ease forwards;
    animation-delay: 0.5s;
}

@keyframes aparecer {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* OFERTA */
.offer {
    padding: 40px 20px;
}

input {
    padding: 12px;
    margin: 8px;
    width: 220px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 12px 25px;
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: darkred;
}

/* BOTÓN FLOTANTE */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>⚠️ CUIDADO CON EL LADRÓN DEL HAMBRE</h1>
    <p>Anda suelto en Viña… y ataca fuerte</p>

    <div class="product">
        🍔 <strong>CHORO PORTEÑO</strong><br>
        Pan crujiente + relleno brutal + sabor que no perdona
    </div>
</div>

<!-- OFERTA -->
<div class="offer">
    <h2>💥 20% DE DESCUENTO</h2>
    <p>Déjanos tus datos y te lo llevas hoy</p>

    <input type="text" placeholder="Nombre"><br>
    <input type="text" placeholder="WhatsApp"><br><br>

    <a href="https://wa.me/56977122535?text=Hola%20Quiero%20el%2020%25%20de%20descuento%20del%20Choro%20Porteno" target="_blank">
        <button>🔥 QUIERO MI 20% OFF</button>
    </a>
</div>

<!-- BOTÓN FLOTANTE -->
<a href="https://wa.me/56977122535?text=Hola%20puedo%20hacer%20un%20pedido" target="_blank" class="whatsapp-float">
    💬 Hacer pedido
</a>

</body>
</html>
