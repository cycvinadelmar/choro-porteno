<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choro Porteño</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

/* HERO */
.hero {
    min-height: 115vh;
    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url("dedia3.png") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 25px 20px 40px 20px;
}

h1 {
    font-size: 1.8rem;
    color: red;
    margin-bottom: 5px;
}

/* TEXTO AL FRENTE */
h1, .subtexto {
    position: relative;
    z-index: 20;
}

/* SUBTEXTO */
.subtexto {
    margin-top: 5px;
    margin-bottom: 10px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #ff3c00;
    background: rgba(0,0,0,0.6);
    padding: 8px 14px;
    border-radius: 8px;
    display: inline-block;
    box-shadow: 0 0 15px rgba(255, 60, 0, 0.5);
}

/* PRODUCTO */
.product {
    margin-top: -10px;
    opacity: 0;
    transform: translateY(30px);
    animation: aparecer 1s ease forwards;
    animation-delay: 0.5s;
}

/* ESCENA SANGUCHE */
.sandwich-scene {
    position: relative;
    width: 95vw;
    max-width: 520px;
    height: 460px;
    margin: 10px auto 0 auto;
}

.layer {
    position: absolute;
    left: 50%;
    width: 100%;
    transform: translateX(-50%);
    pointer-events: none;
    transition: transform 0.08s linear;
}

/* POSICIÓN BASE */
.basepan { top: 295px; z-index: 1; }
.lechuga { top: 250px; z-index: 2; }
.caluga { top: 210px; z-index: 3; }
.tomate { top: 175px; z-index: 4; }
.ajiverde { top: 150px; z-index: 5; }
.cebollamorada { top: 130px; z-index: 6; }
.tapa { top: 95px; z-index: 7; }
.salsa { top: 135px; z-index: 8; }

/* TEXTO INFERIOR */
.descripcion {
    margin-top: -40px;
    font-size: 1.05rem;
    line-height: 1.45;
    background: rgba(0,0,0,0.6);
    padding: 14px 20px;
    border-radius: 10px;
    position: relative;
    z-index: 20;
    font-weight: bold;
    letter-spacing: 0.5px;
}

.descripcion strong {
    color: #ff3c00;
    font-size: 1.2rem;
}

@keyframes aparecer {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* OFERTA */
.offer {
    padding: 40px 20px;
}

.cta-main {
    padding: 20px 40px;
    font-size: 1.3rem;
    background: red;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    animation: pulse 1.5s infinite;
}

.cta-main:hover {
    transform: scale(1.08);
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
}

/* BOTÓN */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    z-index: 99;
}

/* MOBILE */
@media (max-width: 768px) {
    .hero {
        min-height: 120vh;
        padding-top: 18px;
    }

    h1 {
        font-size: 1.45rem;
    }

    .subtexto {
        font-size: 1rem;
        margin-bottom: 12px;
    }

    .sandwich-scene {
        width: 108vw;
        max-width: 470px;
        height: 570px;
        margin-top: -15px;
    }

    .basepan { top: 310px; }
    .lechuga { top: 268px; }
    .caluga { top: 232px; }
    .tomate { top: 200px; }
    .ajiverde { top: 175px; }
    .cebollamorada { top: 155px; }
    .tapa { top: 85px; }
    .salsa { top: 135px; }

    .descripcion {
        margin-top: -20px;
        font-size: 0.95rem;
        line-height: 1.35;
    }
}
</style>
</head>

<body>

<div class="hero">
    <h1>⚠️ CUIDADO CON EL LADRÓN DEL HAMBRE</h1>
    <p class="subtexto">Anda suelto en Viña… y ataca fuerte</p>

    <div class="product">

        <div class="sandwich-scene">
            <img src="basepan.png" class="layer basepan">
            <img src="lechuga.png" class="layer lechuga">
            <img src="caluga.png" class="layer caluga">
            <img src="tomate.png" class="layer tomate">
            <img src="ajiverde.png" class="layer ajiverde">
            <img src="cebollamorada.png" class="layer cebollamorada">
            <img src="tapa.png" class="layer tapa">
            <img src="salsa.png" class="layer salsa">
        </div>

        <p class="descripcion">
            <strong>CHORO PORTEÑO</strong><br>
            PAN CRUJIENTE<br>
            RELLENO BRUTAL<br>
            SABOR QUE NO PERDONA<br>
            UNA EXPERIENCIA INOLVIDABLE
        </p>

    </div>
</div>

<div class="offer">
    <h2>💥 20% DE DESCUENTO</h2>
    <p>Aprovecha tu descuento escribiéndonos directo por WhatsApp</p>

    <a href="https://wa.me/56977122535?text=Hola%20quiero%20mi%2020%25%20OFF" target="_blank">
        <button class="cta-main">🔥 QUIERO MI 20% OFF</button>
    </a>
</div>

<a href="https://wa.me/56977122535" target="_blank" class="whatsapp-float">
    💬 Hacer pedido
</a>

<script>
function animarSandwich() {
    const scroll = window.scrollY;

    const aperturaInicial = 130;
    const velocidadCierre = 1.2;

    const cierre = Math.min(scroll * velocidadCierre, aperturaInicial);
    const move = aperturaInicial - cierre;

    document.querySelector(".basepan").style.transform =
        `translateX(-50%) translateY(${move * 0.22}px)`;

    document.querySelector(".lechuga").style.transform =
        `translateX(-50%) translateY(${-move * 0.2}px)`;

    document.querySelector(".caluga").style.transform =
        `translateX(-50%) translateY(${-move * 0.45}px)`;

    document.querySelector(".tomate").style.transform =
        `translateX(-50%) translateY(${-move * 0.7}px)`;

    document.querySelector(".ajiverde").style.transform =
        `translateX(-50%) translateY(${-move * 0.95}px)`;

    document.querySelector(".cebollamorada").style.transform =
        `translateX(-50%) translateY(${-move * 1.15}px)`;

    document.querySelector(".tapa").style.transform =
        `translateX(-50%) translateY(${-move * 1.45}px)`;

    document.querySelector(".salsa").style.transform =
        `translateX(-50%) translateY(${-move * 1.25}px)`;
}

window.addEventListener("scroll", animarSandwich);
window.addEventListener("load", animarSandwich);
</script>

</body>
</html>
